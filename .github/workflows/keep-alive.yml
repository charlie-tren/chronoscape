name: Supabase keep-alive

# Free-tier Supabase projects pause after 7 days of inactivity, which breaks
# the deployed Streamlit app. This workflow hits the project daily to
# reset the idle timer. Requires repo secrets:
#   - SUPABASE_URL  (e.g. https://xbhhdpcbrsgmactfuxlq.supabase.co)
#   - SUPABASE_ANON_KEY  (the anon key - read-only access is sufficient)

on:
  schedule:
    # Daily at 03:00 UTC (well under the 7-day pause threshold)
    - cron: '0 3 * * *'
  workflow_dispatch:  # allows manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          set -euo pipefail
          response=$(curl --silent --show-error --fail \
            --max-time 30 \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/countries?select=id&limit=1")
          echo "Ping response: $response"
          echo "Supabase keep-alive ping succeeded at $(date -u)"
